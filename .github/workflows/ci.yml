name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # worker-configuration.d.ts is generated and gitignored; the typecheck
      # needs it for the cloudflare:workers module and KVNamespace types.
      - name: Generate Cloudflare Worker types
        run: pnpm --filter web exec wrangler types

      - name: Lint, format, and typecheck
        run: pnpm check

      - name: Test
        run: pnpm test
